{% load static %}


<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'login/css/login.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>Login</title>
  </head>
  
  <body data-error-message="{{ error_message|default:'' }}">
    <div class="container">
      <div class="logo">
        <i class="bi bi-gem"></i>
        <strong>Manager Portal</strong>
        <p>Login</p>
        </div>

        <form class="form" method="post">
            {% csrf_token %}
            <div class="input_field">
              <label for="username">Username</label>
              <input type="text" name="username" id="username" placeholder="Username" required>
            </div>
            <div class="input_field">
              <label for="password">Password</label>
              <input type="password" name="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="form_button">Log in</button>
        </form>
        <div class="account_button">
          <label for="register-link">Don't have an account?</label>
          <a href="{% url 'register' %}" id="register-link" >Account Creation</a>
        </div>
    </div>    
    <script src="{% static 'login/js/login.js' %}"></script>
  </body>

  </html>
